name: parity-vivijure

# Behavioral parity gate: vivijure-core vs skyphusion-labs/vivijure src/ on main.
# Required ruleset check name: parity-vivijure
#
# Runs scripts/parity-with-vivijure.sh (non-strict): modules/types.ts must be
# byte-identical; shared orchestration files may differ by documented platform
# import refactors (docs/PARITY.md). Fails on types drift or missing upstream.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: parity-vivijure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity-vivijure:
    name: parity-vivijure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Checkout vivijure contract (main)
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure-cf
          ref: main
          path: vivijure
          sparse-checkout: src
          sparse-checkout-cone-mode: true

      - name: parity-with-vivijure
        run: bash scripts/parity-with-vivijure.sh ./vivijure
