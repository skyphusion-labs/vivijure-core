name: ci

# Platform ICD + conformance + orchestration unit tests. Required check name: `ci`.
# PUBLIC repo: GitHub-hosted ubuntu-latest (fork-safe).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Checkout vivijure (module manifest drift guard)
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure
          path: vivijure
          sparse-checkout: |
            modules/keyframe
            modules/own-gpu
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
