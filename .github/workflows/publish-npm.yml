name: Publish npm package

# Publish @skyphusion-labs/vivijure-core to the public npm registry.
# Tag push: git tag vivijure-core-v0.9.0 && git push origin vivijure-core-v0.9.0
# Or: workflow_dispatch (uses version in package.json).
#
# Required repo secret: NPM_TOKEN (npmjs.com automation token with publish scope
# for the @skyphusion-labs org).

on:
  push:
    tags:
      - "vivijure-core-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish @skyphusion-labs/vivijure-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - name: Checkout vivijure (quality-tier-drift module manifests)
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure-cf
          path: vivijure
          sparse-checkout: |
            modules/keyframe
            modules/own-gpu
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck && npm test && npm run build

      - name: Verify tag matches package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#vivijure-core-v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag vivijure-core-v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Publish to npm
        run: |
          set -euo pipefail
          pkg="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "${pkg}@${ver}" version >/dev/null 2>&1; then
            echo "Skip: ${pkg}@${ver} already published"
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
